services:
  db:
    image: postgres:15
    container_name: movie_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  s3:
    image: minio/minio
    container_name: movie_s3
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - s3data:/data

volumes:
  pgdata:
  s3data: